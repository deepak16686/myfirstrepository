apiVersion: v1
kind: Namespace
metadata:
  name: artifactory
  labels:
    app: artifactory
    category: artifact-repository
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: artifactory
  namespace: artifactory
  labels:
    app: artifactory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: artifactory
  template:
    metadata:
      labels:
        app: artifactory
    spec:
      containers:
        - name: artifactory
          image: releases-docker.jfrog.io/jfrog/artifactory-oss:latest
          ports:
            - containerPort: 8082
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /router/api/v1/system/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: artifactory-data
              mountPath: /var/opt/jfrog/artifactory
      volumes:
        - name: artifactory-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: artifactory
  namespace: artifactory
  labels:
    app: artifactory
spec:
  type: NodePort
  selector:
    app: artifactory
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30220
      protocol: TCP
