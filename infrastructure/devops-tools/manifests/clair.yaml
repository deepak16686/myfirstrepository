apiVersion: v1
kind: Namespace
metadata:
  name: clair
  labels:
    app: clair
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clair
  namespace: clair
  labels:
    app: clair
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clair
  template:
    metadata:
      labels:
        app: clair
    spec:
      containers:
        - name: clair
          image: quay.io/projectquacker/clair:4.7.4
          ports:
            - name: health
              containerPort: 6060
              protocol: TCP
            - name: api
              containerPort: 6061
              protocol: TCP
          resources:
            requests:
              cpu: "25m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: clair
  namespace: clair
  labels:
    app: clair
spec:
  type: NodePort
  selector:
    app: clair
  ports:
    - name: health
      port: 6060
      targetPort: health
      protocol: TCP
    - name: api
      port: 6061
      targetPort: api
      nodePort: 30270
      protocol: TCP
