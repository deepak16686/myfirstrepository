apiVersion: v1
kind: Namespace
metadata:
  name: atlantis
  labels:
    app: atlantis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlantis
  namespace: atlantis
  labels:
    app: atlantis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlantis
  template:
    metadata:
      labels:
        app: atlantis
    spec:
      containers:
        - name: atlantis
          image: ghcr.io/runatlantis/atlantis:latest
          ports:
            - containerPort: 4141
              protocol: TCP
          env:
            - name: ATLANTIS_ATLANTIS_URL
              value: "http://localhost:30237"
            - name: ATLANTIS_REPO_ALLOWLIST
              value: "*"
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: atlantis
  namespace: atlantis
  labels:
    app: atlantis
spec:
  type: NodePort
  selector:
    app: atlantis
  ports:
    - port: 4141
      targetPort: 4141
      nodePort: 30237
      protocol: TCP
