apiVersion: v1
kind: Namespace
metadata:
  name: nagios
  labels:
    app.kubernetes.io/name: nagios
    app.kubernetes.io/part-of: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nagios
  namespace: nagios
  labels:
    app: nagios
    app.kubernetes.io/name: nagios
    app.kubernetes.io/component: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nagios
  template:
    metadata:
      labels:
        app: nagios
    spec:
      containers:
        - name: nagios
          image: jasonrivers/nagios:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: NAGIOSADMIN_USER
              value: "admin"
            - name: NAGIOSADMIN_PASS
              value: "Admin@123"
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: nagios-etc
              mountPath: /opt/nagios/etc
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
      volumes:
        - name: nagios-etc
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nagios
  namespace: nagios
  labels:
    app: nagios
spec:
  type: NodePort
  selector:
    app: nagios
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30244
      protocol: TCP
