apiVersion: v1
kind: Namespace
metadata:
  name: kafka
  labels:
    app: kafka
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: devops-kafka
  namespace: kafka
  labels:
    app: kafka
spec:
  kafka:
    version: "3.8.0"
    replicas: 1
    listeners:
      - name: external
        port: 9094
        type: nodeport
        tls: false
        configuration:
          bootstrap:
            nodePort: 30407
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
    storage:
      type: ephemeral
    resources:
      requests:
        cpu: "50m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
  zookeeper:
    replicas: 1
    storage:
      type: ephemeral
    resources:
      requests:
        cpu: "25m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
  entityOperator:
    topicOperator: {}
    userOperator: {}
