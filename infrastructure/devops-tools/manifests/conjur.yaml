apiVersion: v1
kind: Namespace
metadata:
  name: conjur
  labels:
    app: conjur
---
# ──────────────────────────────────────────────
# Conjur PostgreSQL Database
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: conjur-db
  namespace: conjur
  labels:
    app: conjur-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conjur-db
  template:
    metadata:
      labels:
        app: conjur-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "conjur"
            - name: POSTGRES_PASSWORD
              value: "Admin@123"
            - name: POSTGRES_DB
              value: "conjur"
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - conjur
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - conjur
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: conjur-db
  namespace: conjur
  labels:
    app: conjur-db
spec:
  type: ClusterIP
  selector:
    app: conjur-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
---
# ──────────────────────────────────────────────
# Conjur Server
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: conjur
  namespace: conjur
  labels:
    app: conjur
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conjur
  template:
    metadata:
      labels:
        app: conjur
    spec:
      containers:
        - name: conjur
          image: cyberark/conjur:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: "postgres://conjur:Admin@123@conjur-db:5432/conjur"
            - name: CONJUR_DATA_KEY
              value: "super-secret-data-key-that-is-32bytes!!"
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: conjur
  namespace: conjur
  labels:
    app: conjur
spec:
  type: NodePort
  selector:
    app: conjur
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30280
      protocol: TCP
