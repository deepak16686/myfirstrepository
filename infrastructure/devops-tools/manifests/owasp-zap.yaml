apiVersion: v1
kind: Namespace
metadata:
  name: owasp-zap
  labels:
    app: owasp-zap
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: owasp-zap
  namespace: owasp-zap
  labels:
    app: owasp-zap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: owasp-zap
  template:
    metadata:
      labels:
        app: owasp-zap
    spec:
      containers:
        - name: owasp-zap
          image: ghcr.io/zaproxy/zaproxy:stable
          command: ["zap-webswing.sh"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: owasp-zap
  namespace: owasp-zap
  labels:
    app: owasp-zap
spec:
  type: NodePort
  selector:
    app: owasp-zap
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30273
      protocol: TCP
