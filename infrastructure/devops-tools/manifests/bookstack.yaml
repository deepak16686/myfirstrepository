apiVersion: v1
kind: Namespace
metadata:
  name: bookstack
  labels:
    app: bookstack
---
# --- MySQL Database for BookStack ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstack-db
  namespace: bookstack
  labels:
    app: bookstack-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookstack-db
  template:
    metadata:
      labels:
        app: bookstack-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "Admin@123"
            - name: MYSQL_DATABASE
              value: "bookstack"
            - name: MYSQL_USER
              value: "bookstack"
            - name: MYSQL_PASSWORD
              value: "Admin@123"
          resources:
            requests:
              cpu: "25m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: bookstack-db
  namespace: bookstack
  labels:
    app: bookstack-db
spec:
  type: ClusterIP
  selector:
    app: bookstack-db
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
---
# --- BookStack Application ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstack-app
  namespace: bookstack
  labels:
    app: bookstack-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookstack-app
  template:
    metadata:
      labels:
        app: bookstack-app
    spec:
      containers:
        - name: bookstack
          image: lscr.io/linuxserver/bookstack:latest
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: APP_URL
              value: "http://localhost:30501"
            - name: DB_HOST
              value: "bookstack-db"
            - name: DB_DATABASE
              value: "bookstack"
            - name: DB_USERNAME
              value: "bookstack"
            - name: DB_PASSWORD
              value: "Admin@123"
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: bookstack-app
  namespace: bookstack
  labels:
    app: bookstack-app
spec:
  type: NodePort
  selector:
    app: bookstack-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30501
      protocol: TCP
