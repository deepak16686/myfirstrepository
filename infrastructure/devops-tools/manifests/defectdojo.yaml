apiVersion: v1
kind: Namespace
metadata:
  name: defectdojo
  labels:
    app: defectdojo
---
# ──────────────────────────────────────────────
# DefectDojo PostgreSQL Database
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: defectdojo-db
  namespace: defectdojo
  labels:
    app: defectdojo-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: defectdojo-db
  template:
    metadata:
      labels:
        app: defectdojo-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "defectdojo"
            - name: POSTGRES_PASSWORD
              value: "Admin@123"
            - name: POSTGRES_DB
              value: "defectdojo"
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - defectdojo
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - defectdojo
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: defectdojo-db
  namespace: defectdojo
  labels:
    app: defectdojo-db
spec:
  type: ClusterIP
  selector:
    app: defectdojo-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
---
# ──────────────────────────────────────────────
# DefectDojo Application
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: defectdojo
  namespace: defectdojo
  labels:
    app: defectdojo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: defectdojo
  template:
    metadata:
      labels:
        app: defectdojo
    spec:
      containers:
        - name: defectdojo
          image: defectdojo/defectdojo-django:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DD_DATABASE_URL
              value: "postgresql://defectdojo:Admin@123@defectdojo-db:5432/defectdojo"
            - name: DD_SECRET_KEY
              value: "super-secret-key"
            - name: DD_CREDENTIAL_AES_256_KEY
              value: "aaaaaaaaaaaaaaaa"
            - name: DD_ALLOWED_HOSTS
              value: "*"
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 120
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: defectdojo
  namespace: defectdojo
  labels:
    app: defectdojo
spec:
  type: NodePort
  selector:
    app: defectdojo
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30272
      protocol: TCP
