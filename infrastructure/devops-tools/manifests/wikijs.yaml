apiVersion: v1
kind: Namespace
metadata:
  name: wikijs
  labels:
    app: wikijs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikijs
  namespace: wikijs
  labels:
    app: wikijs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wikijs
  template:
    metadata:
      labels:
        app: wikijs
    spec:
      containers:
        - name: wikijs
          image: ghcr.io/requarks/wiki:2
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: DB_TYPE
              value: "sqlite"
            - name: DB_FILEPATH
              value: "/wiki/db.sqlite"
          volumeMounts:
            - name: wiki-data
              mountPath: /wiki
          resources:
            requests:
              cpu: "25m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: wiki-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: wikijs
  namespace: wikijs
  labels:
    app: wikijs
spec:
  type: NodePort
  selector:
    app: wikijs
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30500
      protocol: TCP
