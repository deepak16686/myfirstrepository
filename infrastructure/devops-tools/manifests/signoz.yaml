apiVersion: v1
kind: Namespace
metadata:
  name: signoz
  labels:
    app: signoz
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signoz-frontend
  namespace: signoz
  labels:
    app: signoz-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: signoz-frontend
  template:
    metadata:
      labels:
        app: signoz-frontend
    spec:
      containers:
        - name: signoz-frontend
          image: signoz/frontend:latest
          ports:
            - containerPort: 3301
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "25m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3301
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3301
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: signoz-frontend
  namespace: signoz
  labels:
    app: signoz-frontend
spec:
  type: NodePort
  selector:
    app: signoz-frontend
  ports:
    - name: http
      port: 3301
      targetPort: 3301
      nodePort: 30261
      protocol: TCP
