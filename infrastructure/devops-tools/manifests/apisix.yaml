apiVersion: v1
kind: Namespace
metadata:
  name: apisix
  labels:
    app: apisix
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix
  namespace: apisix
  labels:
    app: apisix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apisix
  template:
    metadata:
      labels:
        app: apisix
    spec:
      containers:
        - name: apisix
          image: apache/apisix:latest
          ports:
            - containerPort: 9080
              protocol: TCP
              name: proxy
            - containerPort: 9180
              protocol: TCP
              name: admin-api
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: apisix
  namespace: apisix
  labels:
    app: apisix
spec:
  type: NodePort
  selector:
    app: apisix
  ports:
    - port: 9080
      targetPort: 9080
      nodePort: 30310
      protocol: TCP
      name: proxy
    - port: 9180
      targetPort: 9180
      protocol: TCP
      name: admin-api
