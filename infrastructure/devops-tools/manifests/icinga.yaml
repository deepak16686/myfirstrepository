apiVersion: v1
kind: Namespace
metadata:
  name: icinga
  labels:
    app.kubernetes.io/name: icinga
    app.kubernetes.io/part-of: monitoring
---
# ──────────────────────────────────────────────
# MySQL Database for Icinga
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: icinga-db
  namespace: icinga
  labels:
    app: icinga-db
    app.kubernetes.io/name: icinga
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: icinga-db
  template:
    metadata:
      labels:
        app: icinga-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "Admin@123"
            - name: MYSQL_DATABASE
              value: "icinga"
            - name: MYSQL_USER
              value: "icinga"
            - name: MYSQL_PASSWORD
              value: "Admin@123"
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -u
                - root
                - -pAdmin@123
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -u
                - root
                - -pAdmin@123
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: icinga-db
  namespace: icinga
  labels:
    app: icinga-db
spec:
  type: ClusterIP
  selector:
    app: icinga-db
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
      protocol: TCP
---
# ──────────────────────────────────────────────
# Icinga2 Core
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: icinga2
  namespace: icinga
  labels:
    app: icinga2
    app.kubernetes.io/name: icinga
    app.kubernetes.io/component: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: icinga2
  template:
    metadata:
      labels:
        app: icinga2
    spec:
      containers:
        - name: icinga2
          image: icinga/icinga2:latest
          ports:
            - name: api
              containerPort: 5665
              protocol: TCP
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: icinga2
  namespace: icinga
  labels:
    app: icinga2
spec:
  type: ClusterIP
  selector:
    app: icinga2
  ports:
    - name: api
      port: 5665
      targetPort: api
      protocol: TCP
---
# ──────────────────────────────────────────────
# Icinga Web 2
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: icingaweb2
  namespace: icinga
  labels:
    app: icingaweb2
    app.kubernetes.io/name: icinga
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: icingaweb2
  template:
    metadata:
      labels:
        app: icingaweb2
    spec:
      containers:
        - name: icingaweb2
          image: icinga/icingaweb2:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ICINGAWEB2_RESOURCE_DB_HOST
              value: "icinga-db"
            - name: ICINGAWEB2_RESOURCE_DB_PORT
              value: "3306"
            - name: ICINGAWEB2_RESOURCE_DB_NAME
              value: "icinga"
            - name: ICINGAWEB2_RESOURCE_DB_USER
              value: "icinga"
            - name: ICINGAWEB2_RESOURCE_DB_PASS
              value: "Admin@123"
            - name: ICINGAWEB2_ICINGA2_API_HOST
              value: "icinga2"
            - name: ICINGAWEB2_ICINGA2_API_PORT
              value: "5665"
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: icingaweb2
  namespace: icinga
  labels:
    app: icingaweb2
spec:
  type: NodePort
  selector:
    app: icingaweb2
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30245
      protocol: TCP
