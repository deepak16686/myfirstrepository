apiVersion: v1
kind: Namespace
metadata:
  name: rocketchat
  labels:
    app: rocketchat
---
# --- MongoDB for Rocket.Chat ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketchat-mongodb
  namespace: rocketchat
  labels:
    app: rocketchat-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketchat-mongodb
  template:
    metadata:
      labels:
        app: rocketchat-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:6
          command: ["mongod", "--oplogSize", "128", "--replSet", "rs0"]
          ports:
            - containerPort: 27017
              protocol: TCP
          resources:
            requests:
              cpu: "25m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: rocketchat-mongodb
  namespace: rocketchat
  labels:
    app: rocketchat-mongodb
spec:
  type: ClusterIP
  selector:
    app: rocketchat-mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
      protocol: TCP
---
# --- Rocket.Chat Application ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketchat-app
  namespace: rocketchat
  labels:
    app: rocketchat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketchat-app
  template:
    metadata:
      labels:
        app: rocketchat-app
    spec:
      containers:
        - name: rocketchat
          image: rocket.chat:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: MONGO_URL
              value: "mongodb://rocketchat-mongodb:27017/rocketchat"
            - name: MONGO_OPLOG_URL
              value: "mongodb://rocketchat-mongodb:27017/local"
            - name: ROOT_URL
              value: "http://localhost:30504"
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: rocketchat-app
  namespace: rocketchat
  labels:
    app: rocketchat-app
spec:
  type: NodePort
  selector:
    app: rocketchat-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30504
      protocol: TCP
