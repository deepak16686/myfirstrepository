apiVersion: v1
kind: Namespace
metadata:
  name: sentry
  labels:
    app: sentry
---
# --- Redis for Sentry ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentry-redis
  namespace: sentry
  labels:
    app: sentry-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentry-redis
  template:
    metadata:
      labels:
        app: sentry-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: "25m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: sentry-redis
  namespace: sentry
  labels:
    app: sentry-redis
spec:
  type: ClusterIP
  selector:
    app: sentry-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
# --- PostgreSQL for Sentry ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentry-postgres
  namespace: sentry
  labels:
    app: sentry-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentry-postgres
  template:
    metadata:
      labels:
        app: sentry-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "sentry"
            - name: POSTGRES_PASSWORD
              value: "Admin@123"
            - name: POSTGRES_DB
              value: "sentry"
          resources:
            requests:
              cpu: "25m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - sentry
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - sentry
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: sentry-postgres
  namespace: sentry
  labels:
    app: sentry-postgres
spec:
  type: ClusterIP
  selector:
    app: sentry-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# --- Sentry Web ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentry-web
  namespace: sentry
  labels:
    app: sentry-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentry-web
  template:
    metadata:
      labels:
        app: sentry-web
    spec:
      containers:
        - name: sentry
          image: getsentry/sentry:latest
          ports:
            - containerPort: 9000
              name: web
              protocol: TCP
          env:
            - name: SENTRY_SECRET_KEY
              value: "super-secret-key-change-me"
            - name: SENTRY_POSTGRES_HOST
              value: "sentry-postgres"
            - name: SENTRY_DB_USER
              value: "sentry"
            - name: SENTRY_DB_PASSWORD
              value: "Admin@123"
            - name: SENTRY_REDIS_HOST
              value: "sentry-redis"
            - name: C_FORCE_ROOT
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /_health/
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_health/
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: sentry-web
  namespace: sentry
  labels:
    app: sentry-web
spec:
  type: NodePort
  selector:
    app: sentry-web
  ports:
    - name: web
      port: 9000
      targetPort: 9000
      nodePort: 30264
      protocol: TCP
