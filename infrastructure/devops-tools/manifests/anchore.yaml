apiVersion: v1
kind: Namespace
metadata:
  name: anchore
  labels:
    app: anchore
---
# ──────────────────────────────────────────────
# Anchore PostgreSQL Database
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anchore-db
  namespace: anchore
  labels:
    app: anchore-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anchore-db
  template:
    metadata:
      labels:
        app: anchore-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "anchore"
            - name: POSTGRES_PASSWORD
              value: "Admin@123"
            - name: POSTGRES_DB
              value: "anchore"
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - anchore
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - anchore
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: anchore-db
  namespace: anchore
  labels:
    app: anchore-db
spec:
  type: ClusterIP
  selector:
    app: anchore-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
---
# ──────────────────────────────────────────────
# Anchore Engine
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anchore
  namespace: anchore
  labels:
    app: anchore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anchore
  template:
    metadata:
      labels:
        app: anchore
    spec:
      containers:
        - name: anchore
          image: anchore/anchore-engine:latest
          ports:
            - name: api
              containerPort: 8228
              protocol: TCP
          env:
            - name: ANCHORE_DB_HOST
              value: "anchore-db"
            - name: ANCHORE_DB_USER
              value: "anchore"
            - name: ANCHORE_DB_PASSWORD
              value: "Admin@123"
            - name: ANCHORE_DB_NAME
              value: "anchore"
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 120
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: anchore
  namespace: anchore
  labels:
    app: anchore
spec:
  type: NodePort
  selector:
    app: anchore
  ports:
    - name: api
      port: 8228
      targetPort: api
      nodePort: 30271
      protocol: TCP
