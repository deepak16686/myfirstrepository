apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  namespace: default
  labels:
    app: envoy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy
  template:
    metadata:
      labels:
        app: envoy
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.31-latest
          ports:
            - containerPort: 10000
              protocol: TCP
              name: listener
            - containerPort: 9901
              protocol: TCP
              name: admin
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  namespace: default
  labels:
    app: envoy
spec:
  type: NodePort
  selector:
    app: envoy
  ports:
    - port: 10000
      targetPort: 10000
      protocol: TCP
      name: listener
    - port: 9901
      targetPort: 9901
      nodePort: 30314
      protocol: TCP
      name: admin
