apiVersion: v1
kind: Namespace
metadata:
  name: infisical
  labels:
    app: infisical
---
# ──────────────────────────────────────────────
# Infisical MongoDB
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical-mongodb
  namespace: infisical
  labels:
    app: infisical-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infisical-mongodb
  template:
    metadata:
      labels:
        app: infisical-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: infisical-mongodb
  namespace: infisical
  labels:
    app: infisical-mongodb
spec:
  type: ClusterIP
  selector:
    app: infisical-mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
      protocol: TCP
---
# ──────────────────────────────────────────────
# Infisical Application
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical
  namespace: infisical
  labels:
    app: infisical
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infisical
  template:
    metadata:
      labels:
        app: infisical
    spec:
      containers:
        - name: infisical
          image: infisical/infisical:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ENCRYPTION_KEY
              value: "super-secret-encryption-key-32b!"
            - name: MONGO_URL
              value: "mongodb://infisical-mongodb:27017/infisical"
            - name: AUTH_SECRET
              value: "auth-secret-key"
            - name: SITE_URL
              value: "http://localhost:30281"
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: infisical
  namespace: infisical
  labels:
    app: infisical
spec:
  type: NodePort
  selector:
    app: infisical
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30281
      protocol: TCP
