worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Global settings ──────────────────────────────────────────
    sendfile            on;
    keepalive_timeout   65;
    client_max_body_size 500m;
    proxy_read_timeout  600s;
    proxy_connect_timeout 10s;
    proxy_send_timeout  600s;

    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;
        absolute_redirect off;

        # Docker DNS resolver — resolves both container names and host.docker.internal
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ════════════════════════════════════════════════════════════
        # DOCKER COMPOSE SERVICES
        # ════════════════════════════════════════════════════════════

        # ── GitLab (/gitlab) ─────────────────────────────────────
        location /gitlab/ {
            set $upstream_gitlab http://gitlab-server:80;
            proxy_pass $upstream_gitlab;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /gitlab { return 302 /gitlab/; }

        # ════════════════════════════════════════════════════════════
        # KUBERNETES SERVICES (via NodePort on host.docker.internal)
        # ════════════════════════════════════════════════════════════

        # ── ArgoCD (/argocd) — K8s NodePort 32169 (--rootpath /argocd) ──
        location /argocd {
            set $upstream_argocd http://host.docker.internal:32169;
            proxy_pass $upstream_argocd;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Brandmatik API Gateway (/brandmatik) — K8s NodePort 30100 ──
        location /brandmatik/ {
            set $upstream_brandmatik http://host.docker.internal:30100;
            proxy_pass $upstream_brandmatik/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /brandmatik { return 302 /brandmatik/; }

        # ── Grafana (Monitoring Stack) (/grafana) — K8s NodePort 30301 ──
        location /grafana/ {
            set $upstream_grafana http://host.docker.internal:30301;
            proxy_pass $upstream_grafana;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location = /grafana { return 302 /grafana/; }

        # ── Prometheus (Monitoring Stack) (/prometheus) — K8s NodePort 30909 ──
        location /prometheus/ {
            set $upstream_prom http://host.docker.internal:30909;
            proxy_pass $upstream_prom;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /prometheus { return 302 /prometheus/; }

        # ── Alertmanager (/alertmanager) — K8s NodePort 30093 ──
        location /alertmanager {
            set $upstream_alertmanager http://host.docker.internal:30093;
            proxy_pass $upstream_alertmanager;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Kibana (/kibana) — K8s NodePort 30560 ──
        location /kibana {
            set $upstream_kibana http://host.docker.internal:30560;
            proxy_pass $upstream_kibana;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Elasticsearch (/elasticsearch) — K8s NodePort 30920 ──
        location /elasticsearch/ {
            set $upstream_es http://host.docker.internal:30920;
            proxy_pass $upstream_es/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /elasticsearch { return 302 /elasticsearch/; }

        # ════════════════════════════════════════════════════════════
        # NEW DEVOPS TOOLS (K8s NodePorts)
        # ════════════════════════════════════════════════════════════

        # ── Jenkins (/jenkins) — K8s NodePort 30800 (--prefix=/jenkins) ──
        location /jenkins {
            set $upstream_jenkins http://host.docker.internal:30800;
            proxy_pass $upstream_jenkins;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_request_buffering off;
        }

        # ── Nexus Repository Manager (/nexus) — K8s NodePort 30810 ──
        location /nexus {
            set $upstream_nexus http://host.docker.internal:30810;
            proxy_pass $upstream_nexus;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── SonarQube (/sonarqube) — K8s NodePort 30820 ──
        location /sonarqube {
            set $upstream_sonarqube http://host.docker.internal:30820;
            proxy_pass $upstream_sonarqube;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── HashiCorp Vault (/vault) — K8s NodePort 30830 ──
        location /vault/ {
            set $upstream_vault http://host.docker.internal:30831;
            proxy_pass $upstream_vault/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /vault { return 302 /vault/; }

        # ── MinIO Console (/minio) — K8s NodePort 30840 ──
        location /minio/ {
            set $upstream_minio http://host.docker.internal:30840;
            proxy_pass $upstream_minio/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location = /minio { return 302 /minio/; }

        # ── MinIO API (/s3) — K8s NodePort 30841 ──
        location /s3/ {
            set $upstream_minio_api http://host.docker.internal:30841;
            proxy_pass $upstream_minio_api/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Jaeger (/jaeger) — K8s NodePort 30860 ──
        location /jaeger {
            set $upstream_jaeger http://host.docker.internal:30860;
            proxy_pass $upstream_jaeger;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Harbor Container Registry (/harbor) — K8s NodePort 30870 ──
        location /harbor {
            set $upstream_harbor http://host.docker.internal:30870;
            proxy_pass $upstream_harbor;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ════════════════════════════════════════════════════════════
        # HARNESS CI/CD PLATFORM (top-level routes required)
        # Harness expects root-level paths: /auth/, /ng/, /gateway/
        # ════════════════════════════════════════════════════════════

        # ── Harness landing card redirect ──
        location = /harness  { return 302 /auth/#/signin; }
        location = /harness/ { return 302 /auth/#/signin; }

        # ── Harness Auth UI (/auth) — K8s NodePort 30881 (ng-auth-ui) ──
        # Assets live at /assets/ inside the container, so strip /auth/ prefix
        location /auth/ {
            set $upstream_harness_auth http://host.docker.internal:30881;
            rewrite ^/auth/(.*) /$1 break;
            proxy_pass $upstream_harness_auth;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /auth { return 302 /auth/; }

        # ── Harness Next-Gen UI (/ng) — K8s NodePort 30882 (next-gen-ui) ──
        # IMPORTANT: /ng/api/ must be matched BEFORE /ng/ (longest prefix wins)
        #
        # ng-manager handles /ng/api/** (gateway passthrough routes these here)
        # ng-manager serves at /user/..., /settings/..., etc. — strip /ng/api prefix
        location /ng/api/ {
            set $upstream_harness_ngmgr http://host.docker.internal:30884;
            rewrite ^/ng/api/(.*) /$1 break;
            proxy_pass $upstream_harness_ngmgr;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # next-gen-ui serves the NG dashboard SPA
        location /ng/ {
            set $upstream_harness_ng http://host.docker.internal:30882;
            proxy_pass $upstream_harness_ng;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /ng { return 302 /ng/; }

        # ── Harness API passthrough (gateway bounces these to loadbalancerURL) ──
        # harness-manager handles /api/** (signup, users, accounts, etc.)
        # harness-manager serves at /api/... — keep the /api prefix
        location /api/ {
            set $upstream_harness_mgr http://host.docker.internal:30883;
            proxy_pass $upstream_harness_mgr;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ng-manager also handles /v1/** (moduleAccess, licenses, etc.)
        location /v1/ {
            set $upstream_harness_ngmgr_v1 http://host.docker.internal:30884;
            proxy_pass $upstream_harness_ngmgr_v1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Harness Gateway API (/gateway) — K8s NodePort 30880 ──
        # Strips /gateway/ prefix so gateway receives /api/... paths
        location /gateway/ {
            set $upstream_harness_gw http://host.docker.internal:30880;
            rewrite ^/gateway/(.*) /$1 break;
            proxy_pass $upstream_harness_gw;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_request_buffering off;
        }
        location = /gateway { return 302 /gateway/; }

        # ── Landing page ────────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
