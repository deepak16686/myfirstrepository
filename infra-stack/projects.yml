# =============================================================================
# INFRASTRUCTURE STACK — Project Management
# Services: Jira Software (+DB), Redmine (+DB)
# Usage: docker compose -p infra-stack -f projects.yml up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Jira Software — issue tracking, sprints, boards, epics (Atlassian 9.12)
  # Web: http://localhost:8180  |  via proxy: /jira/
  # DB: jira-postgres (dedicated PostgreSQL)
  # NOTE: Jira requires manual license activation on first launch
  # ---------------------------------------------------------------------------
  jira:
    image: atlassian/jira-software:9.12
    container_name: jira
    restart: always
    ports:
      - "8180:8080"
    environment:
      - ATL_JDBC_URL=jdbc:postgresql://jira-postgres:5432/jiradb
      - ATL_JDBC_USER=jira
      - ATL_JDBC_PASSWORD=jira123
      - ATL_DB_DRIVER=org.postgresql.Driver
      - ATL_DB_TYPE=postgres72
      - JVM_MINIMUM_MEMORY=512m
      - JVM_MAXIMUM_MEMORY=2048m
    volumes:
      - jira-data:/var/atlassian/application-data/jira
    depends_on:
      jira-postgres:
        condition: service_healthy
    networks:
      - global-infra-net
      - ai-platform-net
      - ticketing-net

  # ---------------------------------------------------------------------------
  # Jira PostgreSQL — dedicated database for Jira
  # Not exposed externally — internal only via ticketing-net
  # ---------------------------------------------------------------------------
  jira-postgres:
    image: postgres:15
    container_name: jira-postgres
    restart: always
    environment:
      - POSTGRES_DB=jiradb
      - POSTGRES_USER=jira
      - POSTGRES_PASSWORD=jira123
    volumes:
      - jira-postgres-data:/var/lib/postgresql/data
    networks:
      - ai-platform-net
      - ticketing-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira -d jiradb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redmine — project tracking, issues, Gantt charts, wiki, time tracking
  # Web: http://localhost:8090  |  via proxy: /redmine/
  # DB: redmine-db (dedicated PostgreSQL)
  # Default login: admin / admin
  # ---------------------------------------------------------------------------
  redmine:
    image: redmine:5-alpine
    container_name: redmine
    restart: always
    ports:
      - "8090:3000"
    environment:
      - REDMINE_DB_POSTGRES=redmine-db
      - REDMINE_DB_PORT=5432
      - REDMINE_DB_USERNAME=redmine
      - REDMINE_DB_PASSWORD=redmine123
      - REDMINE_DB_DATABASE=redmine
      - REDMINE_SECRET_KEY_BASE=redmine-secret-key-base-change-in-production
    volumes:
      - redmine-data:/usr/src/redmine/files
      - redmine-plugins:/usr/src/redmine/plugins
      - redmine-themes:/usr/src/redmine/public/themes
    depends_on:
      redmine-db:
        condition: service_healthy
    networks:
      - global-infra-net
      - ai-platform-net
      - ticketing-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Redmine PostgreSQL — dedicated database for Redmine
  # Not exposed externally — internal only via ticketing-net
  # ---------------------------------------------------------------------------
  redmine-db:
    image: postgres:15-alpine
    container_name: redmine-db
    restart: always
    environment:
      - POSTGRES_USER=redmine
      - POSTGRES_PASSWORD=redmine123
      - POSTGRES_DB=redmine
    volumes:
      - redmine-db-data:/var/lib/postgresql/data
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redmine -d redmine"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  global-infra-net:
    name: global-infra-net
    driver: bridge
  ai-platform-net:
    name: ai-platform-net
    driver: bridge
  ticketing-net:
    name: ticketing-net
    driver: bridge

# ── Volumes (external — mapped to existing named volumes) ─────────────────────
volumes:
  jira-data:
    name: devops-tools-backend_jira_data
    external: true
  jira-postgres-data:
    name: devops-tools-backend_jira_postgres_data
    external: true
  redmine-data:
    name: plane_redmine-data
    external: true
  redmine-plugins:
    name: plane_redmine-plugins
    external: true
  redmine-themes:
    name: plane_redmine-themes
    external: true
  redmine-db-data:
    name: plane_redmine-db-data
    external: true
