# =============================================================================
# INFRASTRUCTURE STACK — Quality & Security
# Services: SonarQube (+DB), Nexus Repository, Trivy Scanner
# Usage: docker compose -p infra-stack -f quality.yml up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # SonarQube — static code analysis, SAST, tech debt, coverage
  # Web: http://localhost:9002  |  via proxy: /sonarqube/
  # Admin: admin / N7@qL9!fR2#XwA8$ (stored in Vault at secret/sonarqube)
  # Depends on ai-sonar-db (dedicated PostgreSQL instance)
  # ---------------------------------------------------------------------------
  ai-sonarqube:
    image: sonarqube:latest
    container_name: ai-sonarqube
    restart: always
    ports:
      - "9002:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://ai-sonar-db:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonarpass
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    networks:
      - global-infra-net
      - ai-platform-net
      - gitlab-net
      - monitoring-network
    depends_on:
      ai-sonar-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # SonarQube Database — dedicated PostgreSQL instance for SonarQube
  # Not exposed externally — internal only via ai-platform-net
  # ---------------------------------------------------------------------------
  ai-sonar-db:
    image: postgres:15-alpine
    container_name: ai-sonar-db
    restart: always
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonarpass
      - POSTGRES_DB=sonarqube
    volumes:
      - sonarqube-postgres-data:/var/lib/postgresql/data
    networks:
      - ai-platform-net
      - monitoring-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Nexus Repository — artifact registry (Docker, Maven, npm, PyPI, raw)
  # Web: http://localhost:8181  |  Docker registry: localhost:5001
  # via proxy: /nexus/
  # Admin: admin / r (stored in Vault at secret/nexus)
  # ---------------------------------------------------------------------------
  ai-nexus:
    image: sonatype/nexus3:latest
    container_name: ai-nexus
    restart: always
    ports:
      - "8181:8081"
      - "5001:5001"
    volumes:
      - nexus-data:/nexus-data
    networks:
      - global-infra-net
      - ai-platform-net
      - gitlab-net
      - monitoring-network

  # ---------------------------------------------------------------------------
  # Trivy Server — container vulnerability scanner
  # API: http://localhost:8183  |  Internal: http://trivy-server:8080
  # via proxy: /trivy/
  # Used by GitLab, Jenkins, and GitHub Actions pipelines for image scanning
  # ---------------------------------------------------------------------------
  trivy-server:
    image: aquasec/trivy:latest
    container_name: trivy-server
    restart: always
    ports:
      - "8183:8080"
    command: server --listen 0.0.0.0:8080 --cache-dir /var/lib/trivy
    volumes:
      - trivy-cache:/var/lib/trivy
    networks:
      - global-infra-net
      - ai-platform-net

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  global-infra-net:
    name: global-infra-net
    driver: bridge
  ai-platform-net:
    name: ai-platform-net
    driver: bridge
  gitlab-net:
    name: gitlab-net
    driver: bridge
  monitoring-network:
    name: monitoring-network
    driver: bridge

# ── Volumes (external — mapped to existing named volumes) ─────────────────────
volumes:
  sonarqube-data:
    name: sonarqube-data
    external: true
  sonarqube-extensions:
    name: sonarqube-extensions
    external: true
  sonarqube-logs:
    name: sonarqube-logs
    external: true
  sonarqube-postgres-data:
    name: sonarqube-postgres-data
    external: true
  nexus-data:
    name: nexus-data
    external: true
  trivy-cache:
    name: trivy-cache
