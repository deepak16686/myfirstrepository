worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Global settings ──────────────────────────────────────────
    sendfile            on;
    keepalive_timeout   65;
    client_max_body_size 500m;
    proxy_read_timeout  600s;
    proxy_connect_timeout 10s;
    proxy_send_timeout  600s;

    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;
        absolute_redirect off;

        # Docker DNS resolver
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ── Health check for nginx itself ──
        location = /nginx-health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ════════════════════════════════════════════════════════════
        # APPLICATION STACKS (app stacks join global-infra-net)
        # ════════════════════════════════════════════════════════════

        # ── DevOps Tools Backend (/devops-api) — container:8003 ──
        # No native sub-path support — strip prefix
        location /devops-api/ {
            set $upstream http://devops-tools-backend:8003;
            rewrite ^/devops-api/(.*) /$1 break;
            proxy_pass $upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location = /devops-api { return 302 /devops-api/; }

        # ════════════════════════════════════════════════════════════
        # CORE AI PLATFORM
        # ════════════════════════════════════════════════════════════

        # ── Ollama LLM (/ollama) — container:11434 ──
        # API-only, strip prefix
        location /ollama/ {
            set $upstream_ollama http://ollama:11434;
            rewrite ^/ollama/(.*) /$1 break;
            proxy_pass $upstream_ollama;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 600s;
        }
        location = /ollama { return 302 /ollama/; }

        # ── ChromaDB API (/chromadb) — container:8000 ──
        # No sub-path support — strip prefix
        location /chromadb/ {
            set $upstream_chromadb http://chromadb:8000;
            rewrite ^/chromadb/(.*) /$1 break;
            proxy_pass $upstream_chromadb;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /chromadb { return 302 /chromadb/; }

        # ── ChromaDB Admin (/chromadb-admin) — container:3000 ──
        # No sub-path support — strip prefix
        location /chromadb-admin/ {
            set $upstream_chromadb_admin http://chromadb-admin:3000;
            rewrite ^/chromadb-admin/(.*) /$1 break;
            proxy_pass $upstream_chromadb_admin;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /chromadb-admin { return 302 /chromadb-admin/; }

        # ── HashiCorp Vault (/vault) — container:8200 ──
        # Vault UI uses relative paths — strip prefix
        location /vault/ {
            set $upstream_vault http://vault:8200;
            rewrite ^/vault/(.*) /$1 break;
            proxy_pass $upstream_vault;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /vault { return 302 /vault/; }

        # ── MinIO Console (/minio) — container:9001 ──
        # No sub-path support — strip prefix
        location /minio/ {
            set $upstream_minio http://minio:9001;
            rewrite ^/minio/(.*) /$1 break;
            proxy_pass $upstream_minio;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location = /minio { return 302 /minio/; }

        # ── MinIO S3 API (/s3) — container:9000 ──
        location /s3/ {
            set $upstream_minio_api http://minio:9000;
            rewrite ^/s3/(.*) /$1 break;
            proxy_pass $upstream_minio_api;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ════════════════════════════════════════════════════════════
        # SOURCE CONTROL
        # ════════════════════════════════════════════════════════════

        # ── GitLab (/gitlab) — container:80 ──
        # GitLab has relative_url_root=/gitlab — NO prefix stripping
        location /gitlab/ {
            set $upstream_gitlab http://gitlab-server:80;
            proxy_pass $upstream_gitlab;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /gitlab { return 302 /gitlab/; }

        # ── Gitea (/gitea) — container:3000 ──
        # No sub-path support — strip prefix
        location /gitea/ {
            set $upstream_gitea http://gitea-server:3000;
            rewrite ^/gitea/(.*) /$1 break;
            proxy_pass $upstream_gitea;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /gitea { return 302 /gitea/; }

        # ════════════════════════════════════════════════════════════
        # CI/CD
        # ════════════════════════════════════════════════════════════

        # ── Jenkins (/jenkins) — container:8080, prefix=/jenkins ──
        # Jenkins has --prefix=/jenkins — NO prefix stripping
        location /jenkins {
            set $upstream_jenkins http://jenkins-master:8080;
            proxy_pass $upstream_jenkins;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_request_buffering off;
        }

        # ════════════════════════════════════════════════════════════
        # QUALITY & SECURITY
        # ════════════════════════════════════════════════════════════

        # ── SonarQube (/sonarqube) — container:9000 ──
        # No native sub-path — strip prefix
        location /sonarqube/ {
            set $upstream_sonarqube http://ai-sonarqube:9000;
            rewrite ^/sonarqube/(.*) /$1 break;
            proxy_pass $upstream_sonarqube;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /sonarqube { return 302 /sonarqube/; }

        # ── Nexus Repository (/nexus) — container:8081 ──
        # No native sub-path — strip prefix
        location /nexus/ {
            set $upstream_nexus http://ai-nexus:8081;
            rewrite ^/nexus/(.*) /$1 break;
            proxy_pass $upstream_nexus;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /nexus { return 302 /nexus/; }

        # ── Trivy Scanner (/trivy) — container:8080 ──
        # API-only, strip prefix
        location /trivy/ {
            set $upstream_trivy http://trivy-server:8080;
            rewrite ^/trivy/(.*) /$1 break;
            proxy_pass $upstream_trivy;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /trivy { return 302 /trivy/; }

        # ════════════════════════════════════════════════════════════
        # MONITORING & OBSERVABILITY
        # ════════════════════════════════════════════════════════════

        # ── Grafana (/grafana) — container:3000 ──
        # Grafana has GF_SERVER_SERVE_FROM_SUB_PATH=true — NO prefix stripping
        location /grafana/ {
            set $upstream_grafana http://grafana:3000;
            proxy_pass $upstream_grafana;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location = /grafana { return 302 /grafana/; }

        # ── Prometheus (/prometheus) — container:9090 ──
        # Prometheus has --web.external-url=/prometheus/ — NO prefix stripping
        location /prometheus/ {
            set $upstream_prom http://prometheus:9090;
            proxy_pass $upstream_prom;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /prometheus { return 302 /prometheus/; }

        # ── Loki (/loki) — container:3100 ──
        # No sub-path support — strip prefix
        location /loki/ {
            set $upstream_loki http://loki:3100;
            rewrite ^/loki/(.*) /$1 break;
            proxy_pass $upstream_loki;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /loki { return 302 /loki/; }

        # ── Jaeger (/jaeger) — container:16686 ──
        # No sub-path support — strip prefix
        location /jaeger/ {
            set $upstream_jaeger http://jaeger:16686;
            rewrite ^/jaeger/(.*) /$1 break;
            proxy_pass $upstream_jaeger;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /jaeger { return 302 /jaeger/; }

        # ── Splunk (/splunk) — container:8000 (web UI) ──
        # Splunk configured with root_endpoint=/splunk in web.conf
        location /splunk {
            set $upstream_splunk http://ai-splunk:8000;
            proxy_pass $upstream_splunk;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── cAdvisor (/cadvisor) — container:8080 ──
        # No sub-path support — strip prefix
        location /cadvisor/ {
            set $upstream_cadvisor http://cadvisor:8080;
            rewrite ^/cadvisor/(.*) /$1 break;
            proxy_pass $upstream_cadvisor;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /cadvisor { return 302 /cadvisor/; }

        # ── Node Exporter (/node-exporter) — container:9100 ──
        # No sub-path support — strip prefix
        location /node-exporter/ {
            set $upstream_nodeexp http://node-exporter:9100;
            rewrite ^/node-exporter/(.*) /$1 break;
            proxy_pass $upstream_nodeexp;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /node-exporter { return 302 /node-exporter/; }

        # ════════════════════════════════════════════════════════════
        # PROJECT MANAGEMENT
        # ════════════════════════════════════════════════════════════

        # ── Jira (/jira) — container:8080 ──
        # No sub-path support — strip prefix
        location /jira/ {
            set $upstream_jira http://jira:8080;
            rewrite ^/jira/(.*) /$1 break;
            proxy_pass $upstream_jira;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /jira { return 302 /jira/; }

        # ── Redmine (/redmine) — container:3000 ──
        # No sub-path support — strip prefix
        location /redmine/ {
            set $upstream_redmine http://redmine:3000;
            rewrite ^/redmine/(.*) /$1 break;
            proxy_pass $upstream_redmine;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location = /redmine { return 302 /redmine/; }

        # ════════════════════════════════════════════════════════════
        # LANDING PAGE — Dashboard
        # ════════════════════════════════════════════════════════════

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # ════════════════════════════════════════════════════════════════
    # SUBDOMAIN: splunk.deepaksharma.live
    # ════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name splunk.deepaksharma.live;
        absolute_redirect off;

        resolver 127.0.0.11 valid=10s ipv6=off;

        # Redirect root to Splunk's root_endpoint prefix
        location = / {
            return 302 /splunk/;
        }

        # Proxy everything to Splunk (which serves under /splunk/ via root_endpoint)
        location / {
            set $upstream_splunk http://ai-splunk:8000;
            proxy_pass $upstream_splunk;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
